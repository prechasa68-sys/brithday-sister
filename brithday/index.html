<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday! 🎉</title>
    <!-- โหลดฟอนต์ภาษาไทยเพื่อความสวยงาม (Google Fonts) -->
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        /* =========================================
           1. ตั้งค่าพื้นฐาน (Reset & Base Styles)
           ========================================= */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            /* โทนสีพาสเทลอบอุ่น */
            background: linear-gradient(135deg, #FFE5F1 0%, #FFF2CC 100%);
            font-family: 'Kanit', sans-serif;
            color: #5A4B4A;
            min-height: 100vh;
            overflow: hidden; /* ซ่อน scrollbar ไว้สำหรับลูกโป่งและ confetti ที่ลอยไปมา */
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* =========================================
           2. โครงสร้างหน้าจอ (Screen Layouts)
           ========================================= */
        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            transition: opacity 1s ease, transform 1s ease;
            opacity: 0;
            pointer-events: none;
            transform: scale(0.95);
            z-index: 10;
        }

        .screen.active {
            opacity: 1;
            pointer-events: auto;
            transform: scale(1);
        }

        /* =========================================
           3. กล่องข้อความ (Glassmorphism Card)
           ========================================= */
        .card {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 3rem 2rem;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(255, 182, 193, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.8);
            text-align: center;
            max-width: 90%;
            width: 500px;
            /* แอนิเมชันลอยเบาๆ ให้กล่องดูมีชีวิตชีวา */
            animation: floatCard 6s ease-in-out infinite;
        }

        @keyframes floatCard {
            0% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0); }
        }

        /* =========================================
           4. การตกแต่งตัวอักษร (Typography)
           ========================================= */
        h1 {
            font-size: 2.5rem;
            color: #FF8BA7;
            margin-bottom: 1.2rem;
            font-weight: 600;
        }

        p {
            font-size: 1.3rem;
            line-height: 1.6;
            margin-bottom: 2rem;
            color: #7D6B6B;
        }

        /* Responsive typography สำหรับมือถือ */
        @media (max-width: 480px) {
            h1 { font-size: 2rem; }
            p { font-size: 1.1rem; }
            .card { padding: 2rem 1.5rem; }
            .custom-photo { max-width: 200px; margin-bottom: 10px; }
        }

        /* =========================================
           รูปภาพเซอร์ไพรส์ (Surprise Photo)
           ========================================= */
        .custom-photo {
            width: 100%;
            max-width: 250px;
            height: auto;
            border-radius: 12px;
            margin-bottom: 20px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
            border: 6px solid white;
            object-fit: cover;
            transform: rotate(-3deg);
            transition: transform 0.3s ease;
        }

        .custom-photo:hover {
            transform: rotate(2deg) scale(1.05);
        }

        /* =========================================
           5. ปุ่มกด (Button Styles)
           ========================================= */
        .btn {
            background: linear-gradient(45deg, #FF9EBB, #FFC4C4);
            color: white;
            border: none;
            padding: 14px 30px;
            font-size: 1.2rem;
            font-family: inherit;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 158, 187, 0.5);
            transition: all 0.3s ease;
        }

        .btn:hover {
            transform: scale(1.05) translateY(-3px);
            box-shadow: 0 6px 20px rgba(255, 158, 187, 0.7);
        }

        .btn:active {
            transform: scale(0.95);
        }

        /* =========================================
           6. ฉากหลังแอนิเมชัน (Balloons Background)
           ========================================= */
        .background-elements {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .balloon {
            position: absolute;
            bottom: -120px;
            width: 60px;
            height: 75px;
            border-radius: 50% 50% 50% 50% / 40% 40% 60% 60%;
            box-shadow: inset -5px -5px 15px rgba(0,0,0,0.1);
            animation: rise linear forwards;
        }

        .balloon::before {
            content: '';
            position: absolute;
            bottom: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 2px;
            height: 50px;
            background: rgba(150, 150, 150, 0.4);
        }

        @keyframes rise {
            0% { transform: translateY(0) rotate(0deg); opacity: 0.9; }
            100% { transform: translateY(-120vh) rotate(15deg); opacity: 0; }
        }

    </style>
</head>
<body>

    <!-- พื้นหลังสำหรับลูกโป่ง -->
    <div class="background-elements" id="bg-elements"></div>

    <!-- หน้าแรก (Landing Page) -->
    <div id="screen-landing" class="screen active">
        <div class="card">
            <h1>Happy Birthday 🎉</h1>
            <p>
                ขอให้ประสบผลสำเร็จในหน้าที่การงาน<br>
                อย่าด่าพิอ้ายหลายให้เงินน้องใช้หลายๆ
            </p>
            <button class="btn" onclick="revealSurprise()">กดเพื่อเปิดเซอร์ไพรส์</button>
        </div>
    </div>

    <!-- หน้าเซอร์ไพรส์ (Surprise Page) -->
    <div id="screen-surprise" class="screen">
        <div class="card">
            <!-- เพิ่มรูปภาพ -->
            <img src="photo.jpg/669104730_3402650576571207_9053301539620131679_n.jpg" alt="Our Photo" class="custom-photo">
            
            <h1 style="color: #FF6B6B;">รักเจ้นะ! ❤️</h1>
            <p>
                มีความสุขมากๆ สุขภาพร่างกายแข็งแรง<br>
                สมหวังในทุกเรื่อง รวยๆ ปังๆ จ้าาา! ✨🎂
            </p>
            <button class="btn" style="background: linear-gradient(45deg, #FFD93D, #FFC107); color: #5A4B4A;" onclick="throwConfetti()">จุดพลุฉลองอีกรอบ 🎉</button>
        </div>
    </div>

    <!-- =========================================
         7. JavaScript Logic
         ========================================= -->
    <script>
        // ฟังก์ชันสร้างลูกโป่งลอยขึ้นไปบนหน้าจอ
        function createBalloons() {
            const bg = document.getElementById('bg-elements');
            // ชุดสีพาสเทลสำหรับลูกโป่ง
            const colors = ['#FF9EBB', '#FFC4C4', '#FCE8E6', '#FFF2CC', '#D4E2D4', '#B5EAEA'];
            
            setInterval(() => {
                const balloon = document.createElement('div');
                balloon.classList.add('balloon');
                
                // สุ่มสี
                const randomColor = colors[Math.floor(Math.random() * colors.length)];
                balloon.style.background = randomColor;
                
                // สุ่มตำแหน่งซ้ายขวา
                balloon.style.left = Math.random() * 90 + 5 + 'vw';
                
                // สุ่มระยะเวลาการลอย (ความเร็ว)
                const duration = Math.random() * 6 + 6; // 6 ถึง 12 วินาที
                balloon.style.animationDuration = duration + 's';
                
                bg.appendChild(balloon);
                
                // ลบทิ้งเมื่อลอยพ้นจอไปแล้ว
                setTimeout(() => {
                    balloon.remove();
                }, duration * 1000);

            }, 1000); // สร้างลูกใหม่ทุก 1 วินาที
        }

        // ฟังก์ชันจุดพลุกระดาษ (Confetti) แบบ Native JS
        function throwConfetti() {
            const colors = ['#FF9EBB', '#FFC4C4', '#FCE8E6', '#FFF2CC', '#D4E2D4', '#FFD93D', '#FF6B6B'];
            const confettiCount = 150; // จำนวนพลุกระดาษ

            for (let i = 0; i < confettiCount; i++) {
                const confetti = document.createElement('div');
                
                // สุ่มรูปร่าง (สี่เหลี่ยม หรือ วงกลม)
                const isCircle = Math.random() > 0.5;
                
                confetti.style.position = 'fixed';
                confetti.style.width = Math.random() * 10 + 5 + 'px';
                confetti.style.height = Math.random() * 10 + 5 + 'px';
                confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.borderRadius = isCircle ? '50%' : '0';
                
                // เริ่มต้นที่กลางจอด้านล่าง หรือสุ่มด้านบน
                confetti.style.top = '50%';
                confetti.style.left = '50%';
                confetti.style.zIndex = '1000';
                confetti.style.pointerEvents = 'none';
                
                document.body.appendChild(confetti);
                
                // คำนวณทิศทางกระจายพุ่งขึ้นด้านบนแล้วตกลง
                const angle = Math.random() * Math.PI * 2;
                const velocity = Math.random() * 400 + 100;
                const tx = Math.cos(angle) * velocity;
                // พุ่งขึ้นด้านบน
                const ty = -Math.abs(Math.sin(angle) * velocity) - 300; 
                
                const fallDuration = Math.random() * 2 + 1.5; // 1.5 - 3.5 วินาที
                
                // Web Animations API
                confetti.animate([
                    { transform: `translate(-50%, -50%) rotate(0deg)`, opacity: 1 },
                    { transform: `translate(calc(-50% + ${tx}px), calc(-50% + ${ty + window.innerHeight}px)) rotate(${Math.random() * 720}deg)`, opacity: 0 }
                ], {
                    duration: fallDuration * 1000,
                    easing: 'cubic-bezier(.17,.67,.83,.67)',
                    fill: 'forwards'
                });
                
                // ลบออกจาก DOM หลังเล่นจบ
                setTimeout(() => {
                    confetti.remove();
                }, fallDuration * 1000);
            }
        }

        // ฟังก์ชันเปลี่ยนหน้าเมื่อกดปุ่ม "กดเพื่อเปิดเซอร์ไพรส์"
        function revealSurprise() {
            // จุดพลุก่อน
            throwConfetti();
            
            // ซ่อนหน้าแรก
            document.getElementById('screen-landing').classList.remove('active');
            
            // แสดงหน้าเซอร์ไพรส์
            setTimeout(() => {
                document.getElementById('screen-surprise').classList.add('active');
            }, 800);
        }

        // เริ่มแอนิเมชันลูกโป่งทำงานตอนโหลดเว็บเสร็จ
        window.onload = () => {
            createBalloons();
        };
    </script>
</body>
</html>
